
services:
  gig-dev:
    build:
      context: .
      dockerfile: Dockerfile
    command: npm run build
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - REACT_APP_ENV=development
    stdin_open: true
    tty: true
    networks:
      - gig-network
   
networks:
  gig-network:
    driver: bridge
